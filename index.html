<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Glyzier — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <aside class="left">
        <header class="brand">
          <div class="logo"></div>
          <div class="name">Glyzier</div>
        </header>

        <main class="auth">
          <h1>Sign in</h1>
          <p class="subtitle">Your journey starts here!!! Sign in.</p>

          <form class="form" action="#" method="post" onsubmit="return false;">
            <label class="field">
              <span class="label">Email</span>
              <input type="email" name="email" placeholder="you@example.com" required />
            </label>

            <label class="field password">
              <span class="label">Password</span>
              <input id="password" type="password" name="password" placeholder="Password" required />
              <button type="button" class="toggle" aria-label="Toggle password visibility" data-toggle-password></button>
            </label>

            <label class="checkbox">
              <input type="checkbox" />
              <span>Keep me logged in</span>
            </label>

            <button class="primary" type="submit">Sign in</button>

            <div class="divider">
              <span>or</span>
            </div>

            <button class="google" type="button">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" />
              <span>Sign in with Google</span>
            </button>

            <p class="cta">Need an account? <a href="#">Create one</a></p>
          </form>
        </main>
      </aside>

      <section class="right">
        <figure class="artwork">
          <img id="art-img" alt="Random artwork" />
          <figcaption class="credit" id="art-credit"></figcaption>
        </figure>
      </section>
    </div>

    <script src="./script.js"></script>
  </body>
  </html>
